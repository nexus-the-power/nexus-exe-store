<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NΞXUS Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #03030c;
  --card-bg: rgba(18,18,30,0.85);
  --gold: #e8b73b;
  --purple: #b77cff;
  --text: #f0f0ff;
  --text-muted: #b0b0cc;
  --transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
}
body {
  margin:0; padding:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 30% 20%, #120c2a 0%, #020208 100%);
  color: var(--text);
  min-height:100vh;
}
.lightning-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden;}
.bolt{position:absolute;background:linear-gradient(135deg,#b77cff,#5f2eff);filter:blur(18px);opacity:0.3;animation:floatLightning 14s infinite alternate;}
.bolt1{top:5%;left:-5%;width:260px;height:460px;clip-path:polygon(40% 0%,60% 20%,35% 40%,55% 60%,30% 80%,50% 100%,20% 100%,0% 70%,25% 45%,10% 20%);animation:floatLightning 14s infinite alternate;}
.bolt2{bottom:0;right:-2%;width:320px;height:520px;clip-path:polygon(70% 0%,85% 25%,65% 45%,90% 70%,60% 85%,80% 100%,40% 95%,30% 70%,55% 55%,40% 30%);animation:floatLightning2 18s infinite alternate;}
@keyframes floatLightning{0%{transform:translate(0,0) rotate(0deg);opacity:0.2;}100%{transform:translate(25px,-15px) rotate(3deg);opacity:0.45;}}
@keyframes floatLightning2{0%{transform:translate(0,0) rotate(0deg);opacity:0.2;}100%{transform:translate(-20px,20px) rotate(-4deg);opacity:0.4;}}
.wrapper{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:2rem 1.5rem 5rem;}
h1{font-size:clamp(3rem,12vw,5rem);font-weight:800;background:linear-gradient(130deg,#fff 20%,#f5cf7b 60%,#d4a017 90%);background-clip:text;-webkit-background-clip:text;color:transparent;text-align:center;}
.nav{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;}
.nav button{padding:0.5rem 1.2rem;border-radius:30px;border:1px solid var(--purple);background:rgba(20,20,35,0.8);color:var(--text);cursor:pointer;transition:var(--transition);}
.nav button:hover{background:var(--purple);border-color:var(--gold);}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;}
.glass-card{background:var(--card-bg);backdrop-filter:blur(12px);border-radius:2rem;padding:1.5rem;transition:var(--transition);}
.glass-card:hover{transform:translateY(-6px);border:1px solid var(--gold);}
.card img{width:100%;border-radius:1rem;margin-bottom:1rem;}
.btn{display:inline-flex;align-items:center;gap:8px;background:rgba(20,20,35,0.8);border:1px solid rgba(183,124,255,0.5);padding:0.5rem 1.2rem;border-radius:60px;color:var(--text);text-decoration:none;cursor:pointer;transition:var(--transition);}
.btn:hover{background:var(--purple);border-color:var(--gold);}
.hidden{display:none;}
.user-info{margin:1rem 0;text-align:center;}
</style>
</head>
<body>

<div class="lightning-bg">
  <div class="bolt bolt1"></div>
  <div class="bolt bolt2"></div>
</div>

<div class="wrapper">
<h1>NΞXUS STORE</h1>
<div class="nav">
  <button onclick="showPage('store')">🏬 Store</button>
  <button onclick="showPage('library')">📚 Library</button>
  <button onclick="showPage('community')">🌐 Community</button>
</div>

<!-- LOGIN -->
<div class="glass-card" style="text-align:center;">
  <button id="loginBtn" class="btn">🔐 Google Login</button>
  <button id="logoutBtn" class="btn hidden">🚪 Logout</button>
  <div id="userInfo" class="user-info hidden"></div>
</div>

<!-- STORE -->
<div id="store" class="grid-3">
  <!-- Firestore items loaded here -->
</div>

<!-- LIBRARY -->
<div id="library" class="grid-3 hidden">
  <!-- User library loaded here -->
</div>

<!-- COMMUNITY -->
<div id="community" class="grid-3 hidden">
  <div class="glass-card">
    <h2>Community Links</h2>
    <a class="btn" href="https://discord.gg/Ac5eRRCEgz" target="_blank">Discord</a>
    <a class="btn" href="https://www.youtube.com/channel/UCCHUo4oRYy2uYM8mnD_X-zg" target="_blank">YouTube</a>
    <a class="btn" href="https://www.instagram.com/nex.us80/" target="_blank">Instagram</a>
    <a class="btn" href="https://www.tiktok.com/@nexus_395?lang=hu-HU" target="_blank">TikTok</a>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJG4mX9MyaG4j0i5fToIqw33v1VpeK2Yo",
  authDomain: "nexus-store-01.firebaseapp.com",
  projectId: "nexus-store-01",
  storageBucket: "",
  messagingSenderId: "1012726686106",
  appId: "1:1012726686106:web:17eba62845856d5ef09a23",
  measurementId: "G-EGVS3PGJEN"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userInfo = document.getElementById('userInfo');
const storeDiv = document.getElementById('store');
const libraryDiv = document.getElementById('library');

function showPage(page){
  storeDiv.classList.add('hidden');
  libraryDiv.classList.add('hidden');
  document.getElementById('community').classList.add('hidden');
  document.getElementById(page).classList.remove('hidden');
}

// Login / Logout
auth.onAuthStateChanged(user=>{
  if(user){
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    userInfo.classList.remove('hidden');
    userInfo.innerText = `👋 Hello, ${user.displayName}`;
    loadStore();
    loadLibrary();
  } else {
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
    userInfo.classList.add('hidden');
    storeDiv.innerHTML="";
    libraryDiv.innerHTML="";
  }
});
loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
logoutBtn.onclick=()=>auth.signOut();

// Load store items from Firestore
function loadStore(){
  db.collection('storeItems').get().then(snapshot=>{
    storeDiv.innerHTML="";
    snapshot.forEach(doc=>{
      const data = doc.data();
      const card = document.createElement('div');
      card.className='glass-card card';
      card.innerHTML=`
        <img src="${data.img || 'https://placehold.co/300x400/1e1a2e/ffd966?text=Item'}">
        <h3>${data.title}</h3>
        <button class="btn" onclick="addToLibrary('${doc.id}','${data.title}','${data.fileUrl}')">GET</button>
      `;
      storeDiv.appendChild(card);
    });
  });
}

// Add to user library
function addToLibrary(id,title,url){
  const user = auth.currentUser;
  if(!user){alert("Login required!"); return;}
  db.collection('users').doc(user.uid).collection('library').doc(id).set({title,fileUrl:url}).then(loadLibrary);
}

// Load user library
function loadLibrary(){
  const user = auth.currentUser;
  if(!user) return;
  db.collection('users').doc(user.uid).collection('library').get().then(snapshot=>{
    libraryDiv.innerHTML="";
    snapshot.forEach(doc=>{
      const data = doc.data();
      const card = document.createElement('div');
      card.className='glass-card card';
      card.innerHTML=`
        <img src="https://placehold.co/300x400/1e1a2e/ffd966?text=Library">
        <h3>${data.title}</h3>
        <a class="btn" href="${data.fileUrl}" target="_blank">↓ Download</a>
        <button class="btn" onclick="removeFromLibrary('${doc.id}')">REMOVE</button>
      `;
      libraryDiv.appendChild(card);
    });
  });
}

function removeFromLibrary(id){
  const user = auth.currentUser;
  if(!user) return;
  db.collection('users').doc(user.uid).collection('library').doc(id).delete().then(loadLibrary);
}
</script>

</body>
</html>
