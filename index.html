<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NΞXUS Store & Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#03030c;--card-bg:rgba(18,18,30,0.85);--glass-border:rgba(255,255,255,0.08);--gold:#e8b73b;--purple:#b77cff;--text:#f0f0ff;}
body{background:radial-gradient(ellipse at 30% 20%,#120c2a 0%,#020208 100%);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;}
.wrapper{max-width:1280px;margin:0 auto;padding:2rem;}
h1{text-align:center;font-size:3rem;margin-bottom:2rem;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem;}
.glass-card{background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:2rem;padding:1.5rem;transition:0.3s;box-shadow:0 20px 35px -12px rgba(0,0,0,0.5);}
.glass-card:hover{transform:translateY(-6px);border-color:var(--gold);}
.btn{padding:0.6rem 1.2rem;border-radius:60px;background:rgba(20,20,35,0.8);color:var(--text);border:1px solid var(--purple);cursor:pointer;margin:0.3rem;}
#userPanel{position:fixed;top:-60px;right:1rem;display:flex;align-items:center;gap:10px;background:rgba(20,20,35,0.8);border-radius:60px;padding:0.6rem 1.2rem;transition:top 0.6s,opacity 0.6s;opacity:0;}
#userPanel.show{top:1rem;opacity:1;}
#tabs{display:flex;gap:2rem;justify-content:center;margin-bottom:2rem;cursor:pointer;}
#tabs div{padding:0.5rem 1.2rem;border-radius:40px;background:rgba(20,20,35,0.8);}
#tabs div.active{background:var(--purple);color:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>
<div class="wrapper">
<h1>NΞXUS Store</h1>

<div id="loginCard" class="glass-card" style="text-align:center;">
<button id="loginBtn" class="btn">🔐 Google Login</button>
</div>

<div id="userPanel">
<img id="userAvatar" src="" width="40" height="40" style="border-radius:50%;border:1px solid var(--gold);">
<span id="userName"></span>
<button id="logoutBtn" class="btn">🚪 Logout</button>
</div>

<div id="tabs">
<div id="tabStore" class="active">Store</div>
<div id="tabLibrary">Library</div>
<div id="tabCommunity">Community</div>
</div>

<div id="storeContent" class="tab-content active"></div>
<div id="libraryContent" class="tab-content"></div>
<div id="communityContent" class="tab-content glass-card" style="text-align:center;">
<a class="btn" href="https://discord.gg/Ac5eRRCEgz" target="_blank">Discord</a>
<a class="btn" href="https://www.youtube.com/" target="_blank">YouTube</a>
<a class="btn" href="https://www.instagram.com/" target="_blank">Instagram</a>
<a class="btn" href="https://www.tiktok.com/" target="_blank">TikTok</a>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyANzkn08nF3-_Dsg19wscz67dYRPk8pMgY",
  authDomain: "nexus-08.firebaseapp.com",
  projectId: "nexus-08",
  storageBucket: "nexus-08.appspot.com",
  messagingSenderId: "1066992373942",
  appId: "1:1066992373942:web:cbc354f288a5c351e25617"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userPanel = document.getElementById('userPanel');
const userName = document.getElementById('userName');
const userAvatar = document.getElementById('userAvatar');
const loginCard = document.getElementById('loginCard');

const storeContent = document.getElementById('storeContent');
const libraryContent = document.getElementById('libraryContent');

// Tabs
document.getElementById('tabStore').onclick=()=>{showTab('store')};
document.getElementById('tabLibrary').onclick=()=>{showTab('library')};
document.getElementById('tabCommunity').onclick=()=>{showTab('community')};
function showTab(tab){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('#tabs div').forEach(b=>b.classList.remove('active'));document.getElementById(tab+'Content').classList.add('active');document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');}

// Auth
auth.onAuthStateChanged(async user=>{
  if(user){
    loginCard.style.display='none';
    userPanel.classList.add('show');
    userAvatar.src=user.photoURL;
    userName.textContent=user.displayName;

    // Create user doc
    const userRef=db.collection('users').doc(user.uid);
    await userRef.set({email:user.email,name:user.displayName}, {merge:true});

    loadStore();
    loadLibrary(user.uid);
  } else {
    loginCard.style.display='block';
    userPanel.classList.remove('show');
  }
});

loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
logoutBtn.onclick=()=>auth.signOut();

// Load store
async function loadStore(){
  const snapshot = await db.collection('storeItems').get();
  storeContent.innerHTML='';
  snapshot.forEach(doc=>{
    const d = doc.data();
    const card = document.createElement('div');
    card.className='glass-card';
    card.innerHTML=`<h3>${d.title}</h3>
    <button class="btn" onclick="addToLibrary('${doc.id}','${d.title}','${d.fileUrl}')">GET</button>`;
    storeContent.appendChild(card);
  });
}

// Add to library
async function addToLibrary(id,title,fileUrl){
  const user=firebase.auth().currentUser;
  if(!user) return;
  const libRef=db.collection('users').doc(user.uid).collection('library').doc(id);
  await libRef.set({title,fileUrl});
  loadLibrary(user.uid);
}

// Load library
async function loadLibrary(uid){
  const snapshot = await db.collection('users').doc(uid).collection('library').get();
  libraryContent.innerHTML='';
  snapshot.forEach(doc=>{
    const d=doc.data();
    const card=document.createElement('div');
    card.className='glass-card';
    card.innerHTML=`<h3>${d.title}</h3><a class="btn" href="${d.fileUrl}" target="_blank">Download</a>`;
    libraryContent.appendChild(card);
  });
}
</script>
</body>
</html>
