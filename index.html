<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NΞXUS Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-deep:#03030c;
      --card-bg:rgba(18,18,30,0.85);
      --glass-border:rgba(255,255,255,0.08);
      --gold-primary:#e8b73b;
      --purple-neon:#b77cff;
      --purple-dark:#7c3aff;
      --text-light:#f0f0ff;
      --text-muted:#b0b0cc;
      --transition:all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    body {
      background: radial-gradient(ellipse at 30% 20%, #120c2a 0%, #020208 100%);
      font-family:'Inter',system-ui,sans-serif;
      color:var(--text-light);
      line-height:1.5;
      min-height:100vh;
      overflow-x:hidden;
    }
    .lightning-bg {
      position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden;
    }
    .bolt {
      position:absolute; background:linear-gradient(135deg,#b77cff,#5f2eff); filter:blur(18px); opacity:0.4; animation:pulseGlow 6s infinite alternate; transform:translateZ(0); backface-visibility:hidden;
    }
    .bolt1 { top:5%; left:-5%; width:260px; height:460px; clip-path:polygon(40% 0%,60% 20%,35% 40%,55% 60%,30% 80%,50% 100%,20% 100%,0% 70%,25% 45%,10% 20%); background:linear-gradient(145deg,#b27aff,#3c0b9e); opacity:0.3; animation:floatLightning 14s infinite alternate ease-in-out;}
    .bolt2 { bottom:0; right:-2%; width:320px; height:520px; clip-path:polygon(70% 0%,85% 25%,65% 45%,90% 70%,60% 85%,80% 100%,40% 95%,30% 70%,55% 55%,40% 30%); background:linear-gradient(45deg,#a260ff,#4610b0); opacity:0.25; filter:blur(22px); animation:floatLightning2 18s infinite alternate;}
    .bolt3 { top:40%; left:20%; width:180px; height:380px; background:linear-gradient(120deg,#c28aff,#672eff); clip-path:polygon(50% 0%,65% 30%,45% 45%,70% 65%,48% 80%,68% 100%,35% 95%,25% 70%,45% 55%,30% 30%); filter:blur(14px); opacity:0.35; animation:flicker 3.5s infinite alternate,drift 12s infinite alternate;}
    .spark { position:absolute; width:4px; height:4px; background:#c08aff; border-radius:50%; box-shadow:0 0 12px #a86eff; opacity:0; animation:sparkle 4s infinite;}
    @keyframes floatLightning{0%{transform:translate(0,0) rotate(0deg);opacity:0.2;}100%{transform:translate(25px,-15px) rotate(3deg);opacity:0.45;}}
    @keyframes floatLightning2{0%{transform:translate(0,0) rotate(0deg);opacity:0.2;}100%{transform:translate(-20px,20px) rotate(-4deg);opacity:0.4;}}
    @keyframes flicker{0%{opacity:0.2;filter:blur(16px);}100%{opacity:0.5;filter:blur(10px);}}
    @keyframes drift{0%{transform:translate(0,0);}100%{transform:translate(30px,20px);}}
    @keyframes sparkle{0%{opacity:0;transform:scale(0);}20%{opacity:0.7;transform:scale(1);}80%{opacity:0.4;transform:scale(0.8);}100%{opacity:0;transform:scale(0);}}
    @keyframes pulseGlow{0%{filter:blur(18px);opacity:0.2;}100%{filter:blur(24px);opacity:0.45;}}
    .wrapper { position:relative; z-index:2; max-width:1280px; margin:0 auto; padding:2rem 1.5rem 5rem;}
    .hero { text-align:center; margin:2rem 0 3rem 0; }
    .avatar { width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,215,120,0.6); box-shadow:0 0 20px rgba(212,160,23,0.4);}
    .brand { margin-top:1rem; font-size:1.5rem; letter-spacing:6px; background:linear-gradient(135deg,#f5e3b0,#d4a017); background-clip:text; -webkit-background-clip:text; color:transparent;}
    h1 { font-size:clamp(3rem,12vw,5.8rem); font-weight:800; letter-spacing:8px; background:linear-gradient(130deg,#ffffff 20%,#f5cf7b 60%,#d4a017 90%); background-clip:text; -webkit-background-clip:text; color:transparent;}
    .sub { color:var(--text-muted); border-bottom:1px dashed rgba(212,160,23,0.4); display:inline-block; padding-bottom:6px;}
    .tabs { display:flex; gap:2rem; margin-bottom:2rem; }
    .tab { padding:0.8rem 1.5rem; cursor:pointer; border-radius:30px; background:rgba(20,20,35,0.6); border:1px solid rgba(183,124,255,0.5); transition:var(--transition); font-weight:600; }
    .tab.active { background:var(--purple-dark); border-color:var(--gold-primary); }
    .tab:hover { background:var(--purple-dark); border-color:var(--gold-primary); }
    .grid-3 { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; }
    .glass-card { background:var(--card-bg); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:2rem; padding:1.8rem; transition:var(--transition); box-shadow:0 20px 35px -12px rgba(0,0,0,0.5);}
    .glass-card:hover { transform:translateY(-6px); border-color:rgba(212,160,23,0.5);}
    .card-header { display:flex; align-items:center; gap:12px; margin-bottom:1.2rem; border-left:3px solid var(--gold-primary); padding-left:1rem; }
    .card-header h2 { font-size:1.5rem; font-weight:700; background:linear-gradient(145deg,#ffffff,#e2ca86); background-clip:text; -webkit-background-clip:text; color:transparent;}
    .btn-group { display:flex; flex-wrap:wrap; gap:1rem; margin-top:1rem;}
    .btn { display:inline-flex; align-items:center; gap:8px; background:rgba(20,20,35,0.8); backdrop-filter:blur(4px); border:1px solid rgba(183,124,255,0.5); padding:0.7rem 1.6rem; border-radius:60px; font-weight:600; color:#eaeaff; text-decoration:none; transition:var(--transition); font-size:0.9rem; cursor:pointer;}
    .btn:hover { background:var(--purple-dark); border-color:var(--gold-primary); box-shadow:0 0 12px rgba(124,58,255,0.6);}
    #userPanel { position:fixed; top:1rem; right:1rem; background:rgba(20,20,35,0.8); border-radius:60px; padding:0.6rem 1.2rem; display:none; align-items:center; gap:10px; transition:0.3s;}
    #userPanel img { width:36px; height:36px; border-radius:50%;}
    #tabsContent > div { display:none; }
    #tabsContent > div.active { display:block; }
    @media (max-width:700px){ .wrapper{padding:1rem;} .grid-3{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="lightning-bg">
  <div class="bolt bolt1"></div>
  <div class="bolt bolt2"></div>
  <div class="bolt bolt3"></div>
  <div class="spark" style="top:15%; left:45%;"></div>
  <div class="spark" style="top:65%; left:80%; animation-delay:1.2s;"></div>
  <div class="spark" style="top:35%; left:10%; animation-delay:2.5s;"></div>
</div>

<div class="wrapper">
  <div class="hero">
    <img class="avatar" src="Nexusprofile.png" alt="NEXUS" onerror="this.src='https://placehold.co/120x120/1e1a2e/ffd966?text=NX'">
    <div class="brand">NΞXUS COLLECTIVE</div>
    <h1>NΞXUS STORE</h1>
    <div class="sub">Gaming • Programs • Innovative Tech</div>
  </div>

  <!-- Login Panel -->
  <div id="userPanel">
    <img id="userAvatar" src="" alt="">
    <span id="userName"></span>
    <button id="logoutBtn" class="btn">🚪 Logout</button>
  </div>
  <div class="glass-card" id="loginCard" style="text-align:center;">
    <button id="loginBtn" class="btn">🔐 Google Login</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="storeTab">STORE</div>
    <div class="tab" data-tab="libraryTab">LIBRARY</div>
    <div class="tab" data-tab="communityTab">COMMUNITY</div>
  </div>

  <div id="tabsContent">
    <!-- STORE -->
    <div id="storeTab" class="active">
      <div class="grid-3" id="storeList"></div>
    </div>

    <!-- LIBRARY -->
    <div id="libraryTab">
      <div class="grid-3" id="libraryList"></div>
    </div>

    <!-- COMMUNITY -->
    <div id="communityTab" class="grid-3">
      <a class="btn" href="https://discord.gg/Ac5eRRCEgz" target="_blank">🎧 Discord</a>
      <a class="btn" href="https://www.youtube.com/channel/UCCHUo4oRYy2uYM8mnD_X-zg" target="_blank">📺 YouTube</a>
      <a class="btn" href="https://www.instagram.com/nex.us80/" target="_blank">📸 Instagram</a>
      <a class="btn" href="https://www.tiktok.com/@nexus_395?lang=hu-HU" target="_blank">📲 TikTok</a>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey:"AIzaSyBJG4mX9MyaG4j0i5fToIqw33v1VpeK2Yo",
    authDomain:"nexus-store-01.firebaseapp.com",
    projectId:"nexus-store-01",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const userPanel = document.getElementById('userPanel');
  const userAvatar = document.getElementById('userAvatar');
  const userName = document.getElementById('userName');
  const loginCard = document.getElementById('loginCard');

  const storeList = document.getElementById('storeList');
  const libraryList = document.getElementById('libraryList');

  const tabs = document.querySelectorAll('.tab');
  const tabsContent = document.querySelectorAll('#tabsContent > div');

  tabs.forEach(tab=>{
    tab.addEventListener('click',()=>{
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      tabsContent.forEach(c=>c.classList.remove('active'));
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  function renderStore(items){
    storeList.innerHTML="";
    items.forEach(doc=>{
      const data = doc.data();
      const div = document.createElement('div');
      div.className='glass-card';
      div.innerHTML=`<div class="card-header"><h2>${data.title}</h2></div><button class="btn" onclick="addToLibrary('${doc.id}','${data.title}','${data.fileUrl}')">GET</button>`;
      storeList.appendChild(div);
    });
  }

  function renderLibrary(items){
    libraryList.innerHTML="";
    items.forEach(doc=>{
      const data = doc.data();
      const div = document.createElement('div');
      div.className='glass-card';
      div.innerHTML=`<div class="card-header"><h2>${data.title}</h2></div>`;
      libraryList.appendChild(div);
    });
  }

  auth.onAuthStateChanged(async user=>{
    if(user){
      loginCard.style.display='none';
      userPanel.style.display='flex';
      userAvatar.src = user.photoURL;
      userName.textContent = user.displayName;

      const storeSnap = await db.collection('storeItems').get();
      renderStore(storeSnap.docs);

      const libSnap = await db.collection('users').doc(user.uid).collection('library').get();
      renderLibrary(libSnap.docs);
    } else {
      loginCard.style.display='block';
      userPanel.style.display='none';
    }
  });

  loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  logoutBtn.onclick=()=>auth.signOut();

  async function addToLibrary(id,title,url){
    const user = auth.currentUser;
    if(!user){ alert("Login required"); return; }
    await db.collection('users').doc(user.uid).collection('library').doc(id).set({title,fileUrl:url});
    const libSnap = await db.collection('users').doc(user.uid).collection('library').get();
    renderLibrary(libSnap.docs);
    alert(`${title} added to library!`);
  }
</script>
</body>
</html>
